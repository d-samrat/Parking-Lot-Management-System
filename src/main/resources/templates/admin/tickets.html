<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Tickets</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            padding: 40px;
        }

        h2 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .table-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #2a5298;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        tr:hover {
            background-color: #f2f6ff;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 18px;
            background-color: #2a5298;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s ease;
        }

        .back-btn:hover {
            background-color: #1e3c72;
            transform: translateY(-2px);
        }

        .wrapper {
            max-width: 1000px;
            margin: auto;
        }
    </style>
</head>

<body>

<div class="wrapper">
    <h2>📋 All Tickets</h2>

    <div class="table-container">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Vehicle</th>
                <th>Spot</th>
                <th>Entry Time</th>
                <th>Exit Time</th>
                <th>Bill</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="ticket : ${tickets}">
                <td th:text="${ticket.id}"></td>
                <td th:text="${ticket.vehicle.regNumber}"></td>
                <td th:text="${ticket.parkingSpot.spotNumber}"></td>
                <td th:text="${ticket.entryTime}"></td>
                <td th:text="${ticket.exitTime}"></td>
                <td th:text="${ticket.billAmount}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <a th:href="@{/admin}" class="back-btn">← Back to Admin</a>
</div>

</body>
</html>
