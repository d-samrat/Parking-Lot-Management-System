<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Parking Lot</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px 60px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 30px;
            color: #333;
        }

        .menu a {
            display: block;
            text-decoration: none;
            margin: 12px 0;
            padding: 12px;
            border-radius: 8px;
            background-color: #2a5298;
            color: white;
            font-weight: bold;
            transition: 0.3s ease;
        }

        .menu a:hover {
            background-color: #1e3c72;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
<div class="container">
    <h2>Parking Lot Management</h2>

    <div class="menu">
        <a th:href="@{/park}">Park Vehicle</a>
        <a th:href="@{/unpark}">Unpark Vehicle</a>
        <a th:href="@{/admin}">Admin Section</a>
    </div>
</div>
</body>
</html>
